<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Tabelas-CSS</title>
    <style>
    	table,th,td{

            position: center;
    		border: 1px solid black;
    		border-collapse: collapse;
    		width: 50%;
    		text-align: center;
    		padding: 8px;
    	}
    </style>
</html>
<body>
	<Tabela style="border: 1px solid black;
	border-collapse: collapse; width: 50%;">
		<tr>
		    <th>Nome</th>
            <th>Valor</th>
            <th>Quantidade</th>

        </tr>
		<tr>
            <td>Pipoca</td>
            <td>10,0</td>
			<td>50</td>

		</tr>
		<tr>
			<td>Bala</td>
            <td>15,0</td>
            <td>15</td>
		<tr>
	</table>


</body>
</html>
